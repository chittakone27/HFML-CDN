<script>

  var translation = {
    "Vaccination site": "ຈຸດສັກຢາ",
    Age: "ອາຍຸ",
    "HPV 1": "ເຂັມ HPV1",
    "HPV 2": "ເຂັມ HPV2",
    "School girls": "ເດັກຍີງໃນໂຮງຮຽນ",
    "Out-of-school girls": "ເດັກຍີງນອກໂຮງຮຽນ",
    School: "ໂຮງຮຽນ",
    "Over 15": "ຫຼາຍກ່ວາ 15",
    "Health centre": "ໂຮງໝໍນ້ອຍ (HC)",
    Total: "ລວມ",
  };

  dhis2.util.on("dhis2.de.event.formReady", function (event, ds) {
    $.get("../api/me", (result) => {
      var locale = result.settings.keyUiLocale;
      if (locale === "lo") {
        $("[translation]").each((index, td) => {
          var content = $(td).html();
          $(td).html(translation[content]);
        });
      }
    });
  });
</script>
