<script>
  var language = "en";

  var translation = [
    {
      key: "Registered",
      value: ["Number enrolled", "ຂຶ້ນທະບຽນ <span class='power1'>(2)</span>"],
    },
    { key: "Rescued", value: ["Cured", "ຫາຍດີ"] },
    { key: "Completed", value: ["Treatment completed", "ຄົບກຳນົດ"] },
    { key: "Failure", value: ["Failure", "ລົ້ມເຫຼວ"] },
    { key: "Died", value: ["Died", "ຕາຍ"] },
    { key: "Defaulted", value: ["Lost to follow-up", "ຫາຍຕົວ"] },
    { key: "Referred_out", value: ["Transfer out", "ຍ້າຍອອກ"] },
    { key: "Not_Evaluate", value: ["Not evaluated", "ບໍ່ໄດ້ປະເມີນ"] },
    { key: "Total", value: ["Total", "ລວມ <span class='power1'>(3)</span>"] },
    { key: "New", value: ["New", "ກໍລະນີໃໝ່"] },
    { key: "Relapsed", value: ["Relapse", "ກັບຄືນ ເປັນອີກ"] },
    {
      key: "Relapsed_after_cue",
      value: ["Return after lost to follow up", "ກັບມາໃຫມ່ ຫຼັງຫາຍຕົວ"],
    },
    { key: "Others", value: ["Other", "ອື່ນໆ"] },
    { key: "on_art", value: ["On ART", "ໄດ້ຮັບ ART"] },
    {
      key: "tb_hiv_patient",
      value: [
        "Number of TB/HIV patients new and relapse in the cohort (TB patients with a positive HIV result in the patient register, obtained either before or after the TB diagnosis",
        "ຈໍານວນຄົນເຈັບ TB/HIV ໃນກຸ່ມຄົນເຈັບວັນນະໂຣກທີ່ໄດ້ຂຶ້ນທະບຽນໃນປຶ້ມຂຶ້ນທະບຽນຄົນເຈັບວັນນະໂຣກ (ຜູ້ທີ່ມີຜົນກວດຫາການຕິດເຊື້ອ HIV ບວກກ່ອນ ຫຼື ຫຼັງການບົ່ງມະຕິວັນນະໂຣກ)",
      ],
    },
    {
      key: "tb_hiv_art",
      value: [
        "Number of TB/HIV patients new and relapse on ART according to the patients register (ART may have been started before, during or after the TB treatment)",
        "ຈໍານວນຄົນເຈັບ TB/HIV ຜູ້ທີ່ໄດ້ຮັບ ART ອີງຕາມປຶ້ມຂຶ້ນທະບຽນຄົນເຈັບວັນນະໂຣກ (ART ອາດເລີ່ມໃຫ້ກ່ອນ, ໃນລະຫວ່າງ ຫຼື ພາຍຫຼັງການປິ່ນປົວວັນນະໂຣກ)",
      ],
    },
  ];

  var PIS = {
    translate: function translate(library, language) {
      //default as English
      var languageOrder = 0;
      if (language == "en") {
        //do nothing
      } else if (language == "lo") {
        languageOrder = 1;
      } else {
        //not identified yet
      }
      $.each(library, function (index, entry) {
        $("." + entry.key).html(entry.value[languageOrder]);
      });
    },
  };

  var getIntValue = function getIntValue(input) {
    if (input == "") {
      return 0;
    } else {
      return parseInt(input);
    }
  };

  var setSectionEventsAll = function setSectionEventsAll() {
    $(".hiv").keyup(function () {
      var trTag = $(this).parent();
      var inputs = trTag.find(".hiv");
      trTag.find("div.total").text(calcData(inputs));
    });
  };

  var sectionTotalCalcAll = function sectionTotalCalcAll() {
    var ctrlTags = $("div.total");
    ctrlTags.each(function () {
      var trTag = $(this).parent().parent();
      var inputs = trTag.find(".hiv");
      $(this).text(calcData(inputs));
    });
  };

  var clearTotals = function clearTotals() {
    $("div.total").text("");
  };

  var calcData = function calcData(inputTag) {
    var total = 0;

    inputTag.each(function () {
      total = getIntValue($($(this).children()[0]).val()) + total;
    });

    return total;
  };

  dhis2.util.on("dhis2.de.event.formReady", function (event, ds) {
    //get current user language
    $.get("../api/me", function (json) {
      language = json.settings.keyUiLocale;
      //do translation for current user
      PIS.translate(translation, language);
    });

    setSectionEventsAll();
  });

  dhis2.util.on("dhis2.de.event.dataValuesLoaded", function (event, ds) {
    clearTotals();
    sectionTotalCalcAll();
  });
</script>
