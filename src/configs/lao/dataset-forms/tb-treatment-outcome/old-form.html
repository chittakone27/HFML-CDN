<script>
  var PIS = {
    translate: function translate(library, language) {
      //default as English
      var languageOrder = 0;
      if (language == "en") {
        //do nothing
      } else if (language == "lo") {
        languageOrder = 1;
      } else {
        //not identified yet
      }
      $.each(library, function (index, entry) {
        $("." + entry.key).html(entry.value[languageOrder]);
      });
    },
  };

  function getIntValue(input) {
    if (input == "") {
      return 0;
    } else {
      return parseInt(input);
    }
  }

  function setSectionEventsAll() {
    $("input").keyup(function () {
      var trTag = $(this).parent().parent();
      var inputs = trTag.find("input");
      trTag.find("div.total").text(calcData(inputs));
    });
  }

  function sectionTotalCalcAll() {
    var ctrlTags = $("div.total");
    ctrlTags.each(function () {
      var trTag = $(this).parent().parent();
      var inputs = trTag.find("input");
      $(this).text(calcData(inputs));
    });
  }

  function clearTotals() {
    $("div.total").text("");
  }

  function calcData(inputTag) {
    var total = 0;

    inputTag.each(function (i) {
      // exlude the first input
      if (i == 0) return true;

      total = getIntValue($(this).val()) + total;
      //console.log(total);
    });

    return total;
  }

  function execute(de1, de2, co1, co2, pe1, pe2, ou) {
    $.get(`../api/dataValues.json?de=${de1}&pe=${pe1}&ou=${ou}&co=${co1}`).then(
      (dataVal) => {
        $(`#${de2}-${co2}-val`).val(parseInt(dataVal));
        $.post(
          `../api/dataValues.json?de=${de2}&pe=${pe2}&ou=${ou}&co=${co2}&value=${parseInt(
            dataVal
          )}`
        );
      }
    );
  }

  function execute2017(de1, de2, co1, co2, pe1, pe2, ou) {
    Promise.resolve(
      $.get(`../api/dataValues.json?de=${de1}&pe=${pe1}&ou=${ou}&co=${co1}`)
      //return fetch( url, {headers} ).then( result => result.json() );
    ).then((arr) => {
      var dataVal = 0;
      arr.forEach((val) => {
        dataVal += parseInt(val);
      });
      $(`#${de2}-${co2}-val`).val(parseInt(dataVal));
      $.post(
        `../api/dataValues.json?de=${de2}&pe=${pe2}&ou=${ou}&co=${co2}&value=${parseInt(
          dataVal
        )}`
      );
    });
  }
