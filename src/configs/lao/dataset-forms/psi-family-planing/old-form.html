    startApp();

    // If preiod is changed, restart the all the settings.
    $("#selectedPeriodId").change(function () {
      if (_intervalId !== undefined) {
        _dataLoaded = false;
        clearInterval(_intervalId);
      }
      startApp();
    });

    $("#orgUnitTree").click(function () {
      if (_intervalId !== undefined) {
        _dataLoaded = false;
        clearInterval(_intervalId);
      }
      startApp();
    });
  });

  function startApp() {
    setSectionEventsAll();
    sectionTotalCalcAll();
  }

  function checkValue_Input() {
    return $(this).val().length > 0;
  }

  function getInputCFIDTags(tagId) {
    return $("input[cfid='" + tagId + "']");
  }

  function getInputTagsByID(tagId) {
    return $("input[id*='" + tagId + "']");
  }
  // $("input[id*='LoRGj1dFh6X-TV90yPZi9iy']")
  // LoRGj1dFh6X-xp6YPoDKUe4-TV90yPZi9iy
  function getInputTagsArray(tagIds) {
    var tagsArray = [];
    for (var i = 1; i < tagIds.length; i++) {
      tagsArray.push("input[id*='" + tagIds[0] + "-" + tagIds[i] + "']");
    }
    return $(tagsArray.join(","));
  }

  function getIntValue(input) {
    if (input == "") {
      return 0;
    } else {
      return parseInt(input);
    }
  }

  function setSectionEventsAll() {
    $("input[cfid]").keyup(function () {
      var cfid_AttrName = $(this).attr("cfid");
      var inputTags = getInputTagsByID(cfid_AttrName);
      var totalTag = $("#" + cfid_AttrName + "Total");
      totalTag.text(calcData(inputTags));
    });
  }

  function sectionTotalCalcAll() {
    $("td.totalValueRow div").each(function () {
      var cfid_AttrName = $(this).attr("id").replace("Total", "");
      var inputTags = getInputTagsByID(cfid_AttrName);
      $(this).text(calcData(inputTags));
    });

    $("td.brownContent div").each(function () {
      // LoRGj1dFh6X-xp6YPoDKUe4-valTotal
      var inputTags;
      // console.log($(this).attr('id').split("-").length);
      if ($(this).attr("id").split("-").length > 1) {
        var cfid_AttrName = $(this).attr("id");
        inputTags = getInputTagsArray(cfid_AttrName.split("-"));
      } else {
        var cfid_AttrName = $(this).attr("id").replace("Total", "");
        inputTags = getInputTagsByID(cfid_AttrName);
      }

      $(this).text(calcData(inputTags));
    });
  }

  function calcData(inputTag) {
    var total = 0;

    inputTag.each(function () {
      total = getIntValue($(this).val()) + total;
    });

    return total;
  }

  function popupCreation() {
    $.fn.popupTooltip = function (side, key) {
      var head = "<b><em>Data element:</em></b><br>",
        content = "<b><em>Definition:</em></b><br>",
        source = "<b><em>Source:</em></b><br>",
        languageOrder = 0;

      $.each(translation, function (index, entry) {
        if (entry.key.localeCompare(key) == 0) {
          if (language == "lo") {
            languageOrder = 4;
            head = "<b><em>ອົງປະກອບຂໍ້ມູນ:</em></b><br>";
            content = "<b><em>ຄວາມໝາຍ:</em></b><br>";
            source = "<b><em>ແຫຼ່ງ:</em></b><br>";
          }
          head +=
            entry.value[languageOrder] +
            " (" +
            entry.value[++languageOrder] +
            ")";
          content += entry.value[++languageOrder];
          source += entry.value[++languageOrder];
        }
      });

      var popupTemplate =
        "<div id='template'>" +
        head +
        "<hr>" +
        content +
        "<hr>" +
        source +
        "</div>";

      var $_elm = $(this);
      $_elm.css("position", "relative");
      if ($_elm.is("span")) $_elm.css("display", "inbline-block");

      var $_popup = $("<div>")
        .addClass("popupTooltip")
        .addClass("side-" + side)
        .html(popupTemplate)
        .hide();
      // .bind('click', function () {
      // 	return false;
      // });

      var $_close = $("<span>")
        .addClass("popupTooltip-close")
        .bind("click", function () {
          closePopup();
          return false;
        });

      $_popup.append($_close);
      $_elm.append($_popup);

      $_popup.fadeIn(600);

      if (side == "right" || side == "left") {
        $_popup.css("margin-top", ($_popup.outerHeight() / 2) * -1);
      }

      function closePopup() {
        $_popup.fadeOut(200, function () {
          $_popup.remove();
        });
      }

      $_elm.on("hide", function () {
        closePopup();
      });
    };
  }

  // the javascript functions
  $(document).ready(function () {
    // prepare guideline popup
    popupCreation();

    // display current user language
    $.get("../api/me", function (json) {
      language = json.settings.keyUiLocale;
      PIS.translate(translation, language);
    });

    // Start App for calculate Total values
    startApp();

    $(".popover").click(function () {
      // get the class name for translation
      var classname = $(this).attr("class").split(" ")[1];
      $(this).popupTooltip("bottom", classname);
      return false;
    });

    // If preiod is changed, restart the all the settings.
    $("#selectedPeriodId").change(function () {
      if (_intervalId !== undefined) {
        _dataLoaded = false;
        clearInterval(_intervalId);
      }

      startApp();
    });
  });

  // Class for display user current language
  PIS = {
    translate: function (library, _language) {
      // set default language as English
      languageOrder = 0;
      if (_language == "en") {
        // do nothing
      } else if (_language == "lo") {
        languageOrder = 4;
      } else {
        // not identified language
      }

      $.each(library, function (index, entry) {
        $("." + entry.key).html(entry.value[languageOrder]);
      });
    },
  };
  //End Translation
