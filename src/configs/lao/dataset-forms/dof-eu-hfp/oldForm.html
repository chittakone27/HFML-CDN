<script>
  var language;

  $(".orangeContent, .yorkGreenContent").keyup(function () {
    var customInput = $(this).children().first();
    var dhis2inputID = $($(this).children()[1]).attr("id");

    $(customInput).val(function (index, value) {
      var saveVal = value
        .replace(/\D/g, "")
        .replace(/\B(?=(\d{3})+(?!\d))/g, "");
      $(this).val(saveVal);
      //dhis2inputID = $('#'+dhis2inputID);
      $("#" + dhis2inputID).val(saveVal);

      $(this).blur(function () {
        prepareAndSave(dhis2inputID, customInput);
      });

      return value.replace(/\D/g, "").replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    });
  });

  function loadSavedDhis2InputValue() {
    setTimeout(function () {
      $(".entryfield").each(function () {
        var customInput = $(this).prev();
        customInput.val(
          $(this)
            .val()
            .replace(/\D/g, "")
            .replace(/\B(?=(\d{3})+(?!\d))/g, ",")
        );
      });
    }, 1500);
  }

  loadSavedDhis2InputValue();

  function prepareAndSave(dhis2inputID, customInput) {
    var split = dhis2.de.splitFieldId(dhis2inputID);
    var dataElementId = split.dataElementId;
    var optionComboId = split.optionComboId;
    saveVal(dataElementId, optionComboId, dhis2inputID);
    setTimeout(function () {
      color = $("#" + dhis2inputID).css("background-color");
      //$(customInput).css('background-color',color);
      $(customInput).css("background-color", "RGB(178,255,167)");
    }, 150);

    {
      key: "Government_Budget",
      value: ["Government budget", "ງົບປະມານປົກກະຕິ"],
    },
  ];

  function translate(translation, language) {
    var languageOrder = 0;
    if (language == "lo") {
      languageOrder = 1;
    }
    $.each(translation, function (index, entry) {
      $("." + entry.key).text(entry.value[languageOrder]);
    });
  }

  $("td[bid]").keyup(function () {
    var bid_tag = $(this).attr("bid");
    $("td[bid='" + bid_tag + "_total']").text(calculateTotal2(bid_tag));
    console.log(bid_tag);
  });

  $("td[cid]").keyup(function () {
    var cid_tag = $(this).attr("cid");
    $("td[cid='" + cid_tag + "_total']").text(calculateTotal(cid_tag));
  });

  function loadTotal() {
    setTimeout(function () {
      $("td[cid*='_total']").each(function () {
        var tag = $(this).attr("cid");
        tag = tag.substring(0, tag.length - 6);

        $(this).text(calculateTotal(tag));
      });

      $("td[bid*='_total']").each(function () {
        var tag = $(this).attr("bid");
        tag = tag.substring(0, tag.length - 6);
        $(this).text(calculateTotal2(tag));
      });
    }, 1500);
  }

  loadTotal();

  // If preiod is changed, restart the all the settings.
  $("#selectedPeriodId").change(function () {
    $(".customInput").val("");
    $(".customInput").css("background-color", "#FFF");
    loadSavedDhis2InputValue();
    loadTotal();
  });

  $("#orgUnitTree").click(function () {
    $(".customInput").val("");
    $(".customInput").css("background-color", "#FFF");
    loadSavedDhis2InputValue();
    loadTotal();
  });

  function calculateTotal(cid_tag) {
    var temp = 0;
    $("td[cid='" + cid_tag + "']").each(function () {
      var value = parseInt($($(this).children()[1]).val());
      value = isNaN(value) ? 0 : value;
      temp += value;
    });
    return temp
      .toString()
      .replace(/\D/g, "")
      .replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  }

  function calculateTotal2(bid_tag) {
    var temp = 0;
    $("td[bid='" + bid_tag + "']").each(function () {
      var value = parseInt($($(this).children()[1]).val());
      value = isNaN(value) ? 0 : value;
      temp += value;
    });
    //console.log(temp);
    return temp
      .toString()
      .replace(/\D/g, "")
      .replace(/\B(?=(\d{3})+(?!\d))/g, ",");
  }
</script>
